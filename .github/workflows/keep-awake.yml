name: Keep Render App Awake

on:
  schedule:
    # Runs every 14 minutes to prevent Render from sleeping (which happens after 15 mins of inactivity)
    - cron: '*/14 * * * *'
  workflow_dispatch: # Allows you to manually trigger the workflow from GitHub

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping the Portfolio App
        run: |
          curl -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/91.0.4472.124 Safari/537.36" -sSf https://portfolio-1-rd3h.onrender.com > /dev/null
          echo "Successfully pinged the application!"
