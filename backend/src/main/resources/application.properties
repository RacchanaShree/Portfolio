# Web Server Configuration
server.port=10005
spring.web.resources.static-locations=classpath:/public/

# Database Configuration (PostgreSQL / Supabase / H2 Fallback)
spring.datasource.url=${DB_URL:jdbc:h2:file:./data/portfoliodb;AUTO_SERVER=TRUE}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}

# JPA / Hibernate Config
spring.jpa.database-platform=${DB_DIALECT:org.hibernate.dialect.H2Dialect}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Logging Configuration for DB Debugging
logging.level.org.springframework.jdbc=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.postgresql=DEBUG


# H2 Console GUI (available at /h2-console)
spring.h2.console.enabled=${H2_CONSOLE:false}
spring.h2.console.path=/h2-console

# Spring Data init
spring.sql.init.mode=always

# File Upload Configuration
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# Custom Resume Storage Configuration
app.resume.storage-path=./uploads/resumes
app.admin.token=${ADMIN_TOKEN:SECURE_TOKEN_NOT_SET}
